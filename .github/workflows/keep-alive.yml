name: Keep Alive
on:
  schedule:
    - cron: "23 */6 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ping app
        run: curl -sf --max-time 60 -o /dev/null https://vadaszvizsga.streamlit.app/
      - uses: gautamkrishnar/keepalive-workflow@v2
        with:
          time_elapsed: 58
